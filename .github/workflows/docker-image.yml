name: Build and deploy Docker image

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: registry.mauriziocarella.it
  IMAGE_NAME: mauriziocarella.it
  IMAGE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
  DEPLOY_HOST: vps.mauriziocarella.it
  DEPLOY_USER: maurizio
  DEPLOY_PATH: /home/maurizio/mauriziocarella.it
  DEPLOY_SERVICE: website

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    needs: [verify]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          build-args: |
            APP_VERSION=${{ env.IMAGE_TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Configure SSH
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/vps_deploy_key
          chmod 600 ~/.ssh/vps_deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          printf '%s' "$DOCKER_PASSWORD" | ssh -i ~/.ssh/vps_deploy_key -o IdentitiesOnly=yes "$DEPLOY_USER@$DEPLOY_HOST" "docker login $REGISTRY --username \"$DOCKER_USERNAME\" --password-stdin && cd $DEPLOY_PATH && docker compose pull $DEPLOY_SERVICE && docker compose up -d --no-deps $DEPLOY_SERVICE && docker image prune -f"
